<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's Coming — Maddy & Nath</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --linen: #f5f0e8;
  --ink: #1a1a18;
  --ink-soft: #3d3a35;
  --ink-muted: #7a756c;
  --ink-faint: #b5afa5;
  --accent: #8b7d6b;
  --accent-light: #c4b9a8;
  --divider: #d9d1c4;
  --white: #fdfcf9;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--linen);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b5afa5' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
}

.header {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadeDown 0.8s ease-out;
}

.monogram {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.35em;
  color: var(--ink);
  margin-bottom: 1.2rem;
}

.header h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(2.2rem, 5vw, 3.4rem);
  font-weight: 400;
  letter-spacing: 0.02em;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 0.6rem;
}

.subtitle {
  font-size: 1.15rem;
  font-weight: 300;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  font-style: italic;
}

.guest-count {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--accent);
  margin-top: 1rem;
  letter-spacing: 0.04em;
}

.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin: 2rem auto;
  max-width: 280px;
}

.divider-ornament::before,
.divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--divider);
}

.divider-ornament span {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.2rem;
  font-style: italic;
  color: var(--accent-light);
}

.search-wrap {
  max-width: 360px;
  margin: 0 auto 2rem;
  position: relative;
  animation: fadeUp 0.8s ease-out 0.2s both;
}

.search-wrap input {
  width: 100%;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.05rem;
  padding: 0.7rem 1rem 0.7rem 2.4rem;
  border: 1px solid var(--divider);
  background: var(--white);
  color: var(--ink);
  outline: none;
  transition: border-color 0.3s ease;
}

.search-wrap input::placeholder { color: var(--ink-faint); font-style: italic; }
.search-wrap input:focus { border-color: var(--accent); }

.search-icon {
  position: absolute;
  left: 0.8rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-faint);
  font-size: 0.9rem;
}

.guest-list { animation: fadeUp 0.8s ease-out 0.3s both; }

.guest-card {
  padding: 1rem 0;
  border-bottom: 1px solid var(--divider);
  opacity: 0;
  animation: fadeIn 0.4s ease-out forwards;
  transition: background 0.3s ease;
}

.guest-card:first-child { border-top: 1px solid var(--divider); }
.guest-card:hover { background: rgba(139, 125, 107, 0.04); }

.guest-card-inner {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.3rem 1rem;
}

.guest-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink);
}

.guest-sep { color: var(--accent-light); font-size: 0.8rem; user-select: none; }
.guest-location { font-size: 1rem; color: var(--ink-muted); }
.guest-role { font-size: 0.95rem; font-style: italic; color: var(--accent); }

.page-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.5rem;
  margin-top: 1.5rem;
}

.page-btn {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.4rem 1rem;
  border: 1px solid var(--divider);
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.3s ease;
}

.page-btn:hover:not(:disabled) { border-color: var(--ink); color: var(--ink); }
.page-btn:disabled { opacity: 0.3; cursor: default; }

.page-indicator { font-size: 0.95rem; color: var(--ink-muted); font-style: italic; }

.no-results, .loading, .error-state {
  text-align: center;
  padding: 3rem 1rem;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--ink-muted);
}

.loading-spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 2px solid var(--divider);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}

.retry-btn {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.5rem 1.5rem;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  margin-top: 1rem;
  transition: all 0.3s ease;
}

.retry-btn:hover { background: var(--ink); color: var(--linen); }

.footer {
  text-align: center;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--divider);
}

.footer p { font-size: 0.95rem; font-weight: 300; color: var(--ink-muted); font-style: italic; }

.venue-info {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 0.8rem;
}

@keyframes fadeDown { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width: 600px) {
  .container { padding: 2rem 1.2rem 3rem; }
  .guest-card-inner { flex-direction: column; gap: 0.1rem; }
  .guest-sep { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="monogram">M &nbsp; N</div>
    <h1>Who's Coming</h1>
    <p class="subtitle">Celebrating with us on Waiheke Island</p>
    <p class="guest-count" id="guestCount"></p>
    <div class="divider-ornament"><span>&</span></div>
  </header>

  <div class="search-wrap">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="searchInput" placeholder="Search guests...">
  </div>

  <div class="guest-list" id="guestList">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Gathering the guest list...</p>
    </div>
  </div>

  <div class="page-controls" id="pageControls" style="display:none;">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#8592; Prev</button>
    <span class="page-indicator" id="pageIndicator"></span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next &#8594;</button>
  </div>

  <footer class="footer">
    <p>Seventeenth of April, 2027</p>
    <div class="venue-info">Mudbrick Vineyard &middot; Waiheke Island, NZ</div>
  </footer>
</div>

<script>
// =============================================================
// CONFIG
// Google Sheet columns: Name | Where They're Travelling From | Special Role
// =============================================================
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSteRRgf48qrY-wA_pf1q9CwbvIkY96CdhwVBlRLdphEM17olwu5i1D1Y09q4WnShyX8NKe39W8WdW/pub?output=csv';
const PER_PAGE = 30;

let allGuests = [], filtered = [], page = 1, search = '';

async function load() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error();
    allGuests = parseCSV(await res.text());
  } catch (e) {
    document.getElementById('guestList').innerHTML =
      '<div class="error-state"><p>Couldn\'t load the guest list right now.</p><button class="retry-btn" onclick="location.reload()">Try Again</button></div>';
    return;
  }
  allGuests.sort((a, b) => a.name.split(' ').slice(-1)[0].toLowerCase().localeCompare(b.name.split(' ').slice(-1)[0].toLowerCase()));
  applyFilters();
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n'), guests = [];
  for (let i = 1; i < lines.length; i++) {
    const c = parseLine(lines[i]);
    if (c.length >= 1 && c[0].trim()) {
      guests.push({ name: c[0].trim(), location: (c[1]||'').trim(), role: (c[2]||'').trim() });
    }
  }
  return guests;
}

function parseLine(line) {
  const r = []; let cur = '', q = false;
  for (const ch of line) {
    if (ch === '"') q = !q;
    else if (ch === ',' && !q) { r.push(cur); cur = ''; }
    else cur += ch;
  }
  r.push(cur);
  return r;
}

function applyFilters() {
  const t = search.toLowerCase();
  filtered = allGuests.filter(g => !t || g.name.toLowerCase().includes(t) || g.location.toLowerCase().includes(t) || g.role.toLowerCase().includes(t));
  page = 1;
  render();
}

function render() {
  const list = document.getElementById('guestList');
  const ctrl = document.getElementById('pageControls');
  const countEl = document.getElementById('guestCount');
  const total = allGuests.length, showing = filtered.length;
  countEl.textContent = showing === total ? total + ' guests joining the celebration' : 'Showing ' + showing + ' of ' + total + ' guests';

  if (!filtered.length) { list.innerHTML = '<div class="no-results">No guests found</div>'; ctrl.style.display = 'none'; return; }

  const pages = Math.ceil(filtered.length / PER_PAGE);
  const slice = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  let h = '';
  slice.forEach((g, i) => {
    h += '<div class="guest-card" style="animation-delay:' + i * 0.04 + 's"><div class="guest-card-inner">';
    h += '<span class="guest-name">' + esc(g.name) + '</span>';
    if (g.location) h += '<span class="guest-sep">&#8226;</span><span class="guest-location">' + esc(g.location) + '</span>';
    if (g.role) h += '<span class="guest-sep">&#8226;</span><span class="guest-role">' + esc(g.role) + '</span>';
    h += '</div></div>';
  });
  list.innerHTML = h;

  if (pages > 1) {
    ctrl.style.display = 'flex';
    document.getElementById('pageIndicator').textContent = 'Page ' + page + ' of ' + pages;
    document.getElementById('prevBtn').disabled = page <= 1;
    document.getElementById('nextBtn').disabled = page >= pages;
  } else { ctrl.style.display = 'none'; }
}

function changePage(d) {
  const np = page + d, pages = Math.ceil(filtered.length / PER_PAGE);
  if (np >= 1 && np <= pages) { page = np; render(); document.getElementById('guestList').scrollIntoView({ behavior: 'smooth', block: 'start' }); }
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => { search = e.target.value; applyFilters(); }, 200);
});

load();
</script>
</body>
</html>
