:root {
  --linen: #f5f0e8;
  --ink: #1a1a18;
  --ink-soft: #3d3a35;
  --ink-muted: #7a756c;
  --ink-faint: #b5afa5;
  --accent: #8b7d6b;
  --accent-light: #c4b9a8;
  --divider: #d9d1c4;
  --white: #fdfcf9;
  --yes: #5a6e52;
  --no: #8b5c5c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Cormorant Garamond', Georgia, serif;
  background: var(--linen);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b5afa5' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
  animation: fadeDown 0.8s ease-out;
}

.monogram { margin-bottom: 1.2rem; }
.monogram img { height: 60px; width: auto; }

.header h1 {
  font-family: 'Perandory', 'Playfair Display', Georgia, serif;
  font-size: clamp(2.4rem, 6vw, 3.8rem);
  font-weight: normal;
  letter-spacing: 0.06em;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}

.subtitle {
  font-size: 1.15rem;
  font-weight: 300;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  font-style: italic;
}

.divider-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  margin: 2rem auto;
  max-width: 280px;
}

.divider-ornament::before,
.divider-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--divider);
}

.divider-ornament span {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.2rem;
  font-style: italic;
  color: var(--accent-light);
}

/* Search / Lookup */
.lookup-section {
  animation: fadeUp 0.8s ease-out 0.2s both;
  margin-bottom: 2rem;
}

.lookup-label {
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 0.6rem;
  text-align: center;
}

.lookup-wrap {
  position: relative;
  max-width: 400px;
  margin: 0 auto;
}

.lookup-wrap input {
  width: 100%;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.1rem;
  padding: 0.8rem 1rem;
  border: 1px solid var(--divider);
  background: var(--white);
  color: var(--ink);
  outline: none;
  text-align: center;
  letter-spacing: 0.02em;
  transition: border-color 0.3s ease;
}

.lookup-wrap input::placeholder { color: var(--ink-faint); font-style: italic; }
.lookup-wrap input:focus { border-color: var(--accent); }

.suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--white);
  border: 1px solid var(--divider);
  border-top: none;
  max-height: 200px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}

.suggestion-item {
  padding: 0.6rem 1rem;
  font-size: 1.05rem;
  cursor: pointer;
  transition: background 0.2s ease;
  text-align: center;
}

.suggestion-item:hover { background: rgba(139, 125, 107, 0.08); }

.suggestion-item .party-hint {
  font-size: 0.85rem;
  color: var(--ink-faint);
  font-style: italic;
  margin-left: 0.5rem;
}

/* RSVP Form */
.rsvp-form {
  animation: fadeUp 0.5s ease-out;
  display: none;
}

.party-header {
  text-align: center;
  margin-bottom: 2rem;
}

.party-header h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.3rem;
}

.party-header p {
  font-size: 1rem;
  color: var(--ink-muted);
  font-style: italic;
}

/* Guest cards in form */
.guest-rsvp-card {
  border: 1px solid var(--divider);
  padding: 1.5rem;
  margin-bottom: 1.2rem;
  background: var(--white);
  transition: border-color 0.3s ease;
}

.guest-rsvp-card.answered { border-color: var(--accent); }

.guest-rsvp-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 0.3rem;
}

.guest-rsvp-role {
  font-size: 0.9rem;
  font-style: italic;
  color: var(--accent);
  margin-bottom: 1rem;
}

/* RSVP Buttons */
.rsvp-buttons {
  display: flex;
  gap: 0.8rem;
  margin-bottom: 1rem;
}

.rsvp-btn {
  flex: 1;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.6rem 1rem;
  border: 1px solid var(--divider);
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.3s ease;
}

.rsvp-btn:hover { border-color: var(--ink); color: var(--ink); }

.rsvp-btn.yes-active {
  background: var(--yes);
  border-color: var(--yes);
  color: var(--white);
}

.rsvp-btn.no-active {
  background: var(--no);
  border-color: var(--no);
  color: var(--white);
}

/* Conditional fields (shown when Yes) */
.yes-fields {
  display: none;
  margin-top: 1rem;
}

.yes-fields.visible { display: block; }

.field-group {
  margin-bottom: 1rem;
}

.field-label {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 0.3rem;
}

.field-hint {
  font-size: 0.8rem;
  color: var(--ink-faint);
  font-style: italic;
  margin-bottom: 0.3rem;
}

.field-input {
  width: 100%;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1rem;
  padding: 0.55rem 0.8rem;
  border: 1px solid var(--divider);
  background: var(--linen);
  color: var(--ink);
  outline: none;
  transition: border-color 0.3s ease;
}

.field-input:focus { border-color: var(--accent); }

.field-input::placeholder { color: var(--ink-faint); font-style: italic; }

/* Recovery party toggle */
.recovery-buttons {
  display: flex;
  gap: 0.6rem;
}

.recovery-btn {
  flex: 1;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.45rem 0.8rem;
  border: 1px solid var(--divider);
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all 0.3s ease;
}

.recovery-btn:hover { border-color: var(--ink); color: var(--ink); }
.recovery-btn.active { background: var(--ink); border-color: var(--ink); color: var(--linen); }

/* Shared fields */
.shared-fields {
  border: 1px solid var(--divider);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  background: var(--white);
  display: none;
}

.shared-fields.visible { display: block; }

.shared-fields-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.3rem;
}

.shared-fields-hint {
  font-size: 0.9rem;
  color: var(--ink-muted);
  font-style: italic;
  margin-bottom: 1rem;
}

/* Submit */
.submit-wrap {
  text-align: center;
  margin-top: 2rem;
}

.submit-btn {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.8rem 3rem;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--linen);
  cursor: pointer;
  transition: all 0.3s ease;
}

.submit-btn:hover { background: transparent; color: var(--ink); }
.submit-btn:disabled { opacity: 0.4; cursor: default; }

/* Already responded */
.already-responded {
  text-align: center;
  padding: 1.5rem;
  border: 1px solid var(--divider);
  background: var(--white);
  margin-bottom: 1.5rem;
}

.already-responded p {
  font-size: 1.05rem;
  color: var(--ink-muted);
  font-style: italic;
}

.already-responded .change-btn {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.4rem 1.2rem;
  border: 1px solid var(--divider);
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  margin-top: 0.8rem;
  transition: all 0.3s ease;
}

.already-responded .change-btn:hover { border-color: var(--ink); color: var(--ink); }

/* Success */
.success-message {
  display: none;
  text-align: center;
  animation: fadeUp 0.5s ease-out;
  padding: 2rem 0;
}

.success-message h2 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 0.8rem;
}

.success-message p {
  font-size: 1.1rem;
  color: var(--ink-muted);
  font-style: italic;
}

/* Loading */
.loading-state {
  text-align: center;
  padding: 3rem 1rem;
}

.loading-spinner {
  display: inline-block;
  width: 28px; height: 28px;
  border: 2px solid var(--divider);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 1rem;
}

.loading-state p {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--ink-muted);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 1px solid var(--divider);
}

.footer p { font-size: 0.95rem; font-weight: 300; color: var(--ink-muted); font-style: italic; }

.venue-info {
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 0.8rem;
}

/* Animations */
@keyframes fadeDown { from { opacity:0; transform:translateY(-15px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width: 600px) {
  .container { padding: 2rem 1.2rem 3rem; }
  .guest-rsvp-card { padding: 1.2rem; }
  .rsvp-buttons { flex-direction: column; }
  .recovery-buttons { flex-direction: column; }
}
</style>
</head>

    <h1>RSVP</h1>
    <p class="subtitle">Seventeenth of April, 2027</p>
    <div class="divider-ornament"><span>&</span></div>
  </header>

  <!-- Loading -->
  <div id="loadingState" class="loading-state">
    <div class="loading-spinner"></div>
    <p>Loading guest list...</p>
  </div>

  <!-- Lookup -->
  <div class="lookup-section" id="lookupSection" style="display:none;">
    <p class="lookup-label">Start typing your name to find your invitation</p>
    <div class="lookup-wrap">
      <input type="text" id="nameInput" placeholder="Your name..." autocomplete="off">
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>

  <!-- RSVP Form -->
  <div class="rsvp-form" id="rsvpForm"></div>

  <!-- Success -->
  <div class="success-message" id="successMessage">
    <h2>Thank You</h2>
    <p>Your RSVP has been received. We can't wait to celebrate with you on Waiheke Island.</p>
  </div>

  <footer class="footer">
    <p>Mudbrick Vineyard &middot; Waiheke Island, NZ</p>
  </footer>
</div>

<script>
// =============================================================
// CONFIG — Replace this URL with your deployed Apps Script URL
// =============================================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzF32LjPpyULp0zyiSbc01l3X_oETVBEaA-M53C9sW6tEfOV24_odEswJCoSd7K5I7AaQ/exec';

let allGuests = [];

// =============================================================
// LOAD GUESTS
// =============================================================
async function loadGuests() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getGuests');
    const data = await res.json();
    allGuests = data.guests || [];
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('lookupSection').style.display = 'block';
    document.getElementById('nameInput').focus();
  } catch (e) {
    document.getElementById('loadingState').innerHTML =
      '<p>Couldn\'t load the guest list. Please try refreshing the page.</p>';
  }
}

// =============================================================
// NAME LOOKUP
// =============================================================
const nameInput = document.getElementById('nameInput');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer;

nameInput.addEventListener('input', function () {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const val = this.value.trim().toLowerCase();
    if (val.length < 2) {
      suggestionsEl.style.display = 'none';
      return;
    }

    // Find matching guests and deduplicate by party
    const matches = [];
    const seenParties = new Set();

    allGuests.forEach(g => {
      const fullName = (g.firstName + ' ' + g.lastName).toLowerCase();
      if (fullName.includes(val)) {
        const partyKey = g.party || (g.firstName + g.lastName);
        if (!seenParties.has(partyKey)) {
          seenParties.add(partyKey);
          const partyMembers = allGuests.filter(m => m.party && m.party === g.party);
          matches.push({
            guest: g,
            partyMembers: partyMembers.length > 1 ? partyMembers : [g]
          });
        }
      }
    });

    if (matches.length === 0) {
      suggestionsEl.innerHTML = '<div class="suggestion-item" style="color:var(--ink-faint);">No matching invitation found</div>';
      suggestionsEl.style.display = 'block';
      return;
    }

    suggestionsEl.innerHTML = matches.map((m, i) => {
      const names = m.partyMembers.map(p => p.firstName + ' ' + p.lastName).join(', ');
      const hint = m.partyMembers.length > 1 ? '<span class="party-hint">(' + m.partyMembers.length + ' guests)</span>' : '';
      return '<div class="suggestion-item" onclick="selectParty(' + i + ')" data-index="' + i + '">' + esc(names) + ' ' + hint + '</div>';
    }).join('');

    suggestionsEl.style.display = 'block';
    window._currentMatches = matches;
  }, 200);
});

// Close suggestions on outside click
document.addEventListener('click', function (e) {
  if (!e.target.closest('.lookup-wrap')) {
    suggestionsEl.style.display = 'none';
  }
});

// =============================================================
// SELECT PARTY & BUILD FORM
// =============================================================
function selectParty(index) {
  const match = window._currentMatches[index];
  const members = match.partyMembers;

  suggestionsEl.style.display = 'none';
  nameInput.value = members.map(m => m.firstName + ' ' + m.lastName).join(', ');
  document.getElementById('lookupSection').style.display = 'none';

  buildForm(members);
}

function buildForm(members) {
  const form = document.getElementById('rsvpForm');
  const anyYes = () => members.some((_, i) => document.querySelector('[data-guest-index="' + i + '"] .rsvp-btn.yes-active'));

  let html = '<div class="party-header">';
  if (members.length > 1) {
    html += '<h2>The ' + esc(members[0].party) + ' Party</h2>';
    html += '<p>Please RSVP for each guest below</p>';
  } else {
    html += '<h2>' + esc(members[0].firstName) + ' ' + esc(members[0].lastName) + '</h2>';
    html += '<p>Please confirm your attendance</p>';
  }
  html += '</div>';

  // Individual guest cards
  members.forEach((g, i) => {
    const hasExisting = g.rsvp !== '';
    html += '<div class="guest-rsvp-card' + (hasExisting ? ' answered' : '') + '" data-guest-index="' + i + '" data-row="' + g.row + '">';
    html += '<div class="guest-rsvp-name">' + esc(g.firstName) + ' ' + esc(g.lastName) + '</div>';
    if (g.specialRole) html += '<div class="guest-rsvp-role">' + esc(g.specialRole) + '</div>';

    if (hasExisting) {
      html += '<div class="already-responded"><p>You\'ve already responded: <strong>' + esc(g.rsvp) + '</strong></p>';
      html += '<button class="change-btn" onclick="enableCard(' + i + ')">Change Response</button></div>';
      html += '<div class="card-form" style="display:none;">';
    } else {
      html += '<div class="card-form">';
    }

    // RSVP buttons
    html += '<div class="rsvp-buttons">';
    html += '<button class="rsvp-btn" onclick="setRsvp(' + i + ',\'Yes\')">Joyfully Accept</button>';
    html += '<button class="rsvp-btn" onclick="setRsvp(' + i + ',\'No\')">Regretfully Decline</button>';
    html += '</div>';

    // Yes fields
    html += '<div class="yes-fields" id="yesFields' + i + '">';

    html += '<div class="field-group">';
    html += '<div class="field-label">WhatsApp Number</div>';
    html += '<div class="field-hint">Include area code. If you\'re not on WhatsApp, leave blank.</div>';
    html += '<input class="field-input" type="tel" id="whatsapp' + i + '" placeholder="+61 4XX XXX XXX" value="' + esc(g.whatsapp) + '">';
    html += '</div>';

    html += '<div class="field-group">';
    html += '<div class="field-label">Dietary Requirements</div>';
    html += '<input class="field-input" type="text" id="dietary' + i + '" placeholder="Any allergies or dietary needs" value="' + esc(g.dietary) + '">';
    html += '</div>';

    html += '<div class="field-group">';
    html += '<div class="field-label">Accommodation Address</div>';
    html += '<div class="field-hint">For on-the-day transport coordination</div>';
    html += '<input class="field-input" type="text" id="accommodation' + i + '" placeholder="Your Waiheke accommodation address" value="' + esc(g.accommodation) + '">';
    html += '</div>';

    html += '<div class="field-group">';
    html += '<div class="field-label">Will you join us for the recovery party the next day?</div>';
    html += '<div class="recovery-buttons">';
    html += '<button class="recovery-btn' + (g.recoveryParty === 'Yes' ? ' active' : '') + '" onclick="setRecovery(' + i + ',\'Yes\')">Yes</button>';
    html += '<button class="recovery-btn' + (g.recoveryParty === 'No' ? ' active' : '') + '" onclick="setRecovery(' + i + ',\'No\')">No</button>';
    html += '<button class="recovery-btn' + (g.recoveryParty === 'Maybe' ? ' active' : '') + '" onclick="setRecovery(' + i + ',\'Maybe\')">Maybe</button>';
    html += '</div></div>';

    html += '</div>'; // yes-fields
    html += '</div>'; // card-form
    html += '</div>'; // guest-rsvp-card
  });

  // Submit
  html += '<div class="submit-wrap">';
  html += '<button class="submit-btn" id="submitBtn" onclick="submitRSVP()">Send RSVP</button>';
  html += '</div>';

  form.innerHTML = html;
  form.style.display = 'block';
  window._currentMembers = members;
}

// =============================================================
// FORM INTERACTIONS
// =============================================================
function enableCard(index) {
  const card = document.querySelector('[data-guest-index="' + index + '"]');
  card.querySelector('.already-responded').style.display = 'none';
  card.querySelector('.card-form').style.display = 'block';
}

function setRsvp(index, value) {
  const card = document.querySelector('[data-guest-index="' + index + '"]');
  const buttons = card.querySelectorAll('.rsvp-btn');
  buttons.forEach(b => b.classList.remove('yes-active', 'no-active'));

  if (value === 'Yes') {
    buttons[0].classList.add('yes-active');
    document.getElementById('yesFields' + index).classList.add('visible');
  } else {
    buttons[1].classList.add('no-active');
    document.getElementById('yesFields' + index).classList.remove('visible');
  }

  card.classList.add('answered');
  card.dataset.rsvp = value;
}

function setRecovery(index, value) {
  const card = document.querySelector('[data-guest-index="' + index + '"]');
  const buttons = card.querySelectorAll('.recovery-btn');
  buttons.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  card.dataset.recovery = value;
}

// =============================================================
// SUBMIT
// =============================================================
async function submitRSVP() {
  const members = window._currentMembers;
  const responses = [];

  for (let i = 0; i < members.length; i++) {
    const card = document.querySelector('[data-guest-index="' + i + '"]');
    const rsvp = card.dataset.rsvp;

    // Check if card form is hidden (already responded and not changed)
    const cardForm = card.querySelector('.card-form');
    if (cardForm && cardForm.style.display === 'none') continue;

    if (!rsvp) {
      alert('Please select Yes or No for ' + members[i].firstName + ' ' + members[i].lastName);
      return;
    }

    const response = {
      row: parseInt(card.dataset.row),
      rsvp: rsvp
    };

    if (rsvp === 'Yes') {
      response.whatsapp = document.getElementById('whatsapp' + i).value;
      response.dietary = document.getElementById('dietary' + i).value;
      response.accommodation = document.getElementById('accommodation' + i).value;
      response.recoveryParty = card.dataset.recovery || '';
    } else {
      response.whatsapp = '';
      response.dietary = '';
      response.accommodation = '';
      response.recoveryParty = '';
    }

    responses.push(response);
  }

  if (responses.length === 0) {
    alert('No changes to submit.');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'submitRSVP', responses: responses })
    });

    // no-cors means we can't read the response, but the request goes through
    document.getElementById('rsvpForm').style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';
  } catch (e) {
    alert('Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Send RSVP';
  }
}

function esc(t) {
  if (!t) return '';
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// =============================================================
// INIT
// =============================================================
loadGuests();
</script>
</body>
</html>
